name: Notify IndexNow

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "index.html"
      - "zh/index.html"
      - "robots.txt"
      - "sitemap.xml"
      - "comfyui-td-indexnow-key.txt"

jobs:
  submit-indexnow:
    name: Submit updated URLs to IndexNow
    runs-on: ubuntu-latest
    steps:
      - name: Submit site URLs
        env:
          INDEXNOW_KEY: comfyui-td-indexnow-key-20260320
          INDEXNOW_KEY_LOCATION: https://jisenhua.github.io/ComfyUI-TD/comfyui-td-indexnow-key.txt
        run: |
          payload='{
            "host": "jisenhua.github.io",
            "key": "'"${INDEXNOW_KEY}"'",
            "keyLocation": "'"${INDEXNOW_KEY_LOCATION}"'",
            "urlList": [
              "https://jisenhua.github.io/ComfyUI-TD/",
              "https://jisenhua.github.io/ComfyUI-TD/zh/"
            ]
          }'

          curl --fail-with-body \
            -H "Content-Type: application/json; charset=utf-8" \
            -X POST \
            -d "${payload}" \
            "https://api.indexnow.org/indexnow"
